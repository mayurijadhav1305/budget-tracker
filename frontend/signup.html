<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker Signup</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="up">
  <div class="signup-box">
    <h3>Signup</h3>
    <form id="signupForm" class="upto">
      <!-- <input type="text" id="username" name="username" placeholder="Username" required /> -->
      <input type="email" id="email" name="email" placeholder="Enter your email" required />
      <input type="password" id="password" name="password" placeholder="Create a password" minlength="6" required />
      <button type="submit" class="signup-title">Signup</button>
    </form>
    <p id="signupMessage" class="message"></p>
    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    <p class="auth-link"><a href="index.html">Back to Home</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
