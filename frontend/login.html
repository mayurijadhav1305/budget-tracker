<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="loginpage">
  <div class="login-box">
    <img
      src="https://png.pngtree.com/png-vector/20241217/ourmid/pngtree-clipart-of-a-money-bag-filled-with-gold-coins-featuring-dollar-png-image_14789520.png"
      width="80"
      alt="money bag"
    />
    <h2>Login Page</h2>
    <form id="loginForm">
      <input type="email" id="email" name="email" placeholder="Email" required />
      <input type="password" id="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="loginMessage" class="message"></p>
    <p class="auth-link">Don't have an account? <a href="signup.html">Signup</a></p>
    <p class="auth-link"><a href="index.html">Back to Home</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
